apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
  namespace: default
spec:
  type: state.postgresql
  version: v1
  metadata:
  - name: connectionString
    value: "host=postgresql.postgres.svc.cluster.local user=learnflow password=learnflow123 dbname=learnflow port=5432 sslmode=disable"
  - name: tableName
    value: "state"
  - name: metadataTableName
    value: "state_metadata"
  - name: timeoutInSeconds
    value: "30"
  - name: cleanupIntervalInSeconds
    value: "3600"
scopes:
- chat-service
- code-service
- exercise-service
- teacher-service
